<!DOCTYPE html>
<html>
<head>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Clock</title>

  <link rel="icon" type="image/png" href="icon.png">

  <style>

    @font-face {
      font-family: "BFDI";
      src: url("shag-louge.otf");
    }

    body {
      margin: 0;
      background: black;
      color: white;

      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;

      height: 100vh;
      overflow: hidden;

      font-family: "BFDI", Arial, sans-serif;
    }

    #clock {
      font-size: 90px;
      color: white;
      margin-bottom: 30px;
    }

    #quote {
      width: 80%;
      text-align: center;
      font-size: 28px;
      color: white;
    }

  </style>

</head>
<body>

  <div id="clock">00:00:00</div>

  <div id="quote">loading bfdi insanity...</div>

  <script>

    const clock = document.getElementById("clock");
    const quote = document.getElementById("quote");

    const quotes = [
      "Yeah I know, she was so surprised.",
      "Really? Oh for sure!",
      "Twooooooo!",
      "Flower went CRAZY!!",
      "Coiny, you're so dumb!",
      "Care to give me some air? No straw needed!",
      "Oh my mint!",
      "Gelatin, stop eating the contestants.",
      "I want revenge!",
      "Hey guys, for a prank-",
      "NO MORE SNOW!",
      "BEEP",
      "Yoylecake!",
      "Aw seriously?",
      "Twooooooo!",
      "This program was brought to you by Blocky's Funny Doings International.",
      "I am next level mad.",
      "Donut, dig faster.",
      "Four, recover them!",
      "No, I hate YOU!",
      "AAAAAAAAAAAAAAAA",
      "This is so unfair!",
      "I love cake at stake!",
      "Eraser, that's kinda suspicious."
    ];

    function pad(n) {
      return n.toString().padStart(2, "0");
    }

    function CheckThisOut() {

      const now = new Date();

      const hours = pad(now.getHours());
      const minutes = pad(now.getMinutes());
      const seconds = pad(now.getSeconds());

      clock.innerText = `${hours}:${minutes}:${seconds}`;
      quote.innerText = quotes[now.getHours()];

    }

    CheckThisOut();

    setInterval(CheckThisOut, 1000);

  </script>

</body>
</html>
